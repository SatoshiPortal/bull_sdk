site_name: Bull SDK
site_description: Unified flutter_rust_bridge bindings for Bitcoin and Liquid wallet operations
site_url: https://bullsdk.dev
repo_url: https://github.com/SatoshiPortal/bull_sdk
repo_name: SatoshiPortal/bull_sdk

theme:
  name: material
  logo: assets/images/bull-logo.png
  favicon: assets/images/bull-logo.png
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.follow

plugins:
  - i18n:
      default_language: en
      fallback_to_default: true
      languages:
        - locale: en
          default: true
          name: English
        - locale: es
          default: false
          name: Español
          nav_translations:
            Home: Inicio
            Getting Started: Primeros Pasos
            Installation: Instalación
            Quick Start: Inicio Rápido
            Architecture: Arquitectura
            API Reference: Referencia API
            Overview: Resumen
            Boltz (Atomic Swaps): Boltz (Swaps Atómicos)
            LWK (Liquid Wallet): LWK (Billetera Liquid)
            Ark (Ark Protocol): Ark (Protocolo Ark)
            BBQr (QR Encoding): BBQr (Codificación QR)
            Bitbox (Hardware Wallet): Bitbox (Billetera de Hardware)
            Development: Desarrollo
            FRB Codegen: Código FRB
            Troubleshooting: Solución de Problemas
        - locale: it
          default: false
          name: Italiano
          nav_translations:
            Home: Home
            Getting Started: Per Iniziare
            Installation: Installazione
            Quick Start: Quick Start
            Architecture: Architettura
            API Reference: Riferimento API
            Overview: Panoramica
            Boltz (Atomic Swaps): Boltz (Swap Atomici)
            LWK (Liquid Wallet): LWK (Wallet Liquid)
            Ark (Ark Protocol): Ark (Protocollo Ark)
            BBQr (QR Encoding): BBQr (Codifica QR)
            Bitbox (Hardware Wallet): Bitbox (Wallet Hardware)
            Development: Sviluppo
            FRB Codegen: Codice FRB
            Troubleshooting: Risoluzione Problemi
        - locale: pt
          default: false
          name: Português
          nav_translations:
            Home: Início
            Getting Started: Primeiros Passos
            Installation: Instalação
            Quick Start: Início Rápido
            Architecture: Arquitetura
            API Reference: Referência da API
            Overview: Visão Geral
            Boltz (Atomic Swaps): Boltz (Swaps Atômicos)
            LWK (Liquid Wallet): LWK (Carteira Liquid)
            Ark (Ark Protocol): Ark (Protocolo Ark)
            BBQr (QR Encoding): BBQr (Codificação QR)
            Bitbox (Hardware Wallet): Bitbox (Carteira de Hardware)
            Development: Desenvolvimento
            FRB Codegen: Código FRB
            Troubleshooting: Solução de Problemas

extra_css:
  - assets/stylesheets/branding.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/SatoshiPortal/bull_sdk

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
  - Architecture: architecture.md
  - API Reference:
    - Overview: api-reference/index.md
    - Boltz (Atomic Swaps): api-reference/boltz.md
    - LWK (Liquid Wallet): api-reference/lwk.md
    - Ark (Ark Protocol): api-reference/ark.md
    - BBQr (QR Encoding): api-reference/bbqr.md
    - Bitbox (Hardware Wallet): api-reference/bitbox.md
  - Development:
    - FRB Codegen: development/frb-codegen.md
    - Troubleshooting: development/troubleshooting.md
