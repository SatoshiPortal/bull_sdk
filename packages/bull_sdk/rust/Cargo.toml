[package]
name = "rust_lib_bull_sdk"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "staticlib"]

[dependencies]
flutter_rust_bridge = "=2.12.0"
# Pinned by commit rev, not `branch` — a branch ref is a moving pointer: if
# migrate-to-bull-sdk is force-pushed or deleted upstream, the commit Cargo.lock
# already resolved to becomes unreachable and a future `cargo build` (or any
# clean-clone rebuild) fails to fetch it, even though the lockfile pins the
# exact rev. Bump these by hand (rev + Cargo.lock) once migrate-to-bull-sdk is
# merged/retired upstream.
ark_wallet = { git = "https://github.com/SatoshiPortal/ark-wallet-dart", rev = "52961f968385717ebce440a8cba54681f92e0736", features = ["bull_sdk"] }
bitbox = { git = "https://github.com/SatoshiPortal/bitbox-dart", rev = "c110af7517707ce3ab847bff32762375703d42c3", features = ["bull_sdk"] }
bbqr = { git = "https://github.com/SatoshiPortal/bbqr-rust.git", rev = "2296a713beb58a175eb620a087f7da6826dc6f70", default-features = false }
dart_bbqr = { git = "https://github.com/SatoshiPortal/bbqr-dart", rev = "50b2397a708aa8083c22ae80a49e4dd0d503632e", features = ["bull_sdk"] }
boltz = { git = "https://github.com/SatoshiPortal/boltz-dart", tag = "v0.5.1", features = ["bull_sdk"] }
lwk = { git = "https://github.com/SatoshiPortal/lwk-dart", rev = "d06988f2e15c160eb60e747aad20aa38d3cc0b1b", features = ["bull_sdk"] }

[dev-dependencies]
secp256k1-zkp = "0.11.0"

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(frb_expand)'] }
