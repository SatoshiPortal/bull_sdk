name: bitbox_transport
description: USB and Bluetooth transport for BitBox02 hardware wallet
version: 0.1.0

environment:
  sdk: "3.12.1"
  flutter: "3.44.1"

dependencies:
  flutter:
    sdk: flutter
  bull_sdk:
    git:
      url: https://github.com/SatoshiPortal/bull_sdk
      ref: main
      path: packages/bull_sdk
  universal_ble: ^2.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: com.bitbox.bitbox_flutter
        pluginClass: BitboxFlutterPlugin
